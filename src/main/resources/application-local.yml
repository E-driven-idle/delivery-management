spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: false
        highlight_sql: true
        jdbc.time_zone: Asia/Seoul

  # OpenAI
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.openai.com
      chat:
        options:
          model: gpt-4o-mini
    retry:
      max-attempts: 2
      backoff:
        initial-interval: 500ms

  # Resilience4j
  resilience4j:
    circuitbreaker:
      instances:
        openai:
          slidingWindowType: COUNT_BASED
          slidingWindowSize: 20
          failureRateThreshold: 50
          waitDurationInOpenState: 30s
          permittedNumberOfCallsInHalfOpenState: 3
    retry:
      instances:
        openai:
          maxAttempts: 1        # 사실상 끄기(Resilience4j로만 재시도)
          waitDuration: 500ms
          retryExceptions:
            - org.springframework.web.client.HttpServerErrorException
            - org.springframework.web.client.ResourceAccessException
            - java.io.IOException
          # 4xx는 기본적으로 재시도 대상에서 제외(설정 최소화)
    ratelimiter:
      instances:
        openai:
          limitForPeriod: 5          # 초당 5회 등, 트래픽/쿼터에 맞게 조절
          limitRefreshPeriod: 1s
          timeoutDuration: 0         # 대기 없이 즉시 실패(백프레셔)

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: ${EXPIRATION}

# KAKAO
kakao:
  local:
    rest-api-key: ${KAKAO_KEY}