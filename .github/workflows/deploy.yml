name: Build, Test & Deploy to EC2 (GHCR)

on:
  push:
    branches: [ "develop" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '17'
  OWNER_LC: ${{ toLower(github.repository_owner) }}
  IMAGE_REPO: delivery-management-app
  IMAGE_NAME: ghcr.io/${{ toLower(github.repository_owner) }}/${{ env.IMAGE_REPO }}
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Test
        run: ./gradlew clean test

      - name:  Build JAR
        run: ./gradlew bootJar

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            JAR_FILE=build/libs/*.jar

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Upload docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"

      - name: Create .env on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/app
            cat > ~/app/.env <<EOF
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EXPIRATION=${{ secrets.EXPIRATION }}
            KAKAO_KEY=${{ secrets.KAKAO_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            SPRING_PROFILES_ACTIVE=develop
            EOF
            echo "OWNER_LC=${{ toLower(github.repository_owner) }}" >> ~/app/.env
            chmod 600 ~/app/.env

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/app

            if [ -n "${{ secrets.GHCR_TOKEN || '' }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            fi

            echo "[INFO] Pull new images..."
            docker compose pull

            echo "[INFO] Up containers..."
            docker compose up -d

            echo "[INFO] Show status..."
            docker compose ps

            echo "[INFO] Health check..."
            curl -fI http://localhost:18080 || echo "service might still be starting"
